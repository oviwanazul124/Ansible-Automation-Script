---
- name: Instalacion automatizada de paquetes
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Actualizar cache de apt (equivalente a apt-get update)
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalar el paquete htop
      apt:
        name: htop
        state: present
