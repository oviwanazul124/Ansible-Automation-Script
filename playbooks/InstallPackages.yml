---
- name: Instalacion automatizada de paquetes
  hosts: all
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3
  gather_facts: yes
  tasks:
    - name: Actualizar cache de apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalar el paquete htop
      apt:
        name: htop
        state: present
