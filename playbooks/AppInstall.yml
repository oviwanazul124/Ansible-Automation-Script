---
- name: App Install
  hosts: all
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
    - name: Install Required Packages
      ansible.builtin.apt:
        name:
          - "{{ packages }}"
        state: present
        update_cache: yes
      loop: "{{ packages_list.split(',') }}"
      