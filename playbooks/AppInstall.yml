---
- name: App Install
  hosts: all
  become: true
  tasks:
    - name: Check what Ansible received
      ansible.builtin.debug:
        msg: "The raw input is: {{ my_packages }}"
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
    - name: Install Required Packages
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update_cache: yes
      loop: "{{ my_packages.split(',') | select('search', '.+') | list }}"